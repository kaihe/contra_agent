# ContraVLA training hyperparameters (frozen VLM backbone)

# Data paths
data_dir: vla/data/level1_action2
name: frozen

# Training
epochs: 4
batch_size: 64
lr: 1.0e-4
weight_decay: 1.0e-2
warmup_steps: 200
grad_clip: 1.0
workers: 4

# Model
freeze_vlm: true
no_freeze_vlm: false

# Hardware
device: cuda
