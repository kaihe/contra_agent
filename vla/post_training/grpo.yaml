# ContraVLA Level-1 MC-GRPO defaults.
# CLI flags override values in this file.

checkpoint: tmp/vla/base_400/best.pt
out_dir: tmp/vla/grpo_400
device: cuda
seed: 0

lr: 2.0e-6

group_size: 32
rollout_len: 48
max_groups: 10000
max_actions: 4000
max_rewind: 32
temperature: 0.9
high_temperature: 1.2

grpo_epochs: 1
batch_size: 8
clip_eps: 0.2
kl_beta: 0.02
entropy_coef: 0.001
max_grad_norm: 1.0

save_every: 25
