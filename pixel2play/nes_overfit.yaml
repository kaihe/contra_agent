shared:
  output_path: ${USER}/policy_model/nes_overfit
  n_seq_timesteps: 200
  frame_height: 192
  frame_width: 192
  tokenizer:
    type: "conv"
    conv_tokenizer_config:
      num_tokens: 1

# Policy Model Configuration — same capacity as nes_150M
policy_model:
  n_transformer_layers: 10
  n_q_head: 16
  n_kv_head: 16
  n_thinking_tokens: 1
  transformer_dim: &transformer_dim 1024
  mask_block_size: 128
  attention_history_len: [200, 200, 200, 200, 200, 200, 200, 200, 200, 200]
  n_kv_sink_tokens: 0
  model_type: "dense"
  dropout: 0.0        # no dropout — we want to overfit

stage3_finetune:
  optim:
    learning_rate: 0.0003
    weight_decay: 0.0    # no weight decay — we want to overfit
    beta_1: 0.9
    beta_2: 0.999

  n_epochs: 200
  n_val_recordings: 0
  accumulate_grad_batches: 4

  training_dataset:
    batch_size: &stage3_batch_size 8
    local_prefix: dataset
    data_folder: annotate/bc_data/level_all_ram

wandb:
  enabled: false
  project: "policy_model"
  exp_name: "contra-nes-overfit"
