shared:
  output_path: ${USER}/policy_model/nes_img_only_168
  n_seq_timesteps: 64

# Policy Model Configuration
# dim=384  layers=6  heads=6  => ~10M parameters
policy_model:
  n_transformer_layers: 6
  n_q_head: 6
  n_kv_head: 6
  transformer_dim: &transformer_dim 384
  mask_block_size: 128
  n_kv_sink_tokens: 0
  model_type: "dense"
  dropout: 0
  use_vision: true
  in_channels: 1
  frame_size: 168
  grid_size: 4
  focal_gamma: 0.0
  ablate: []        # 'img', 'action'


stage3_finetune:
  optim:
    learning_rate: 0.0001
    weight_decay: 0.0001
    beta_1: 0.9
    beta_2: 0.999

  n_epochs: 50
  n_val_recordings: 300
  accumulate_grad_batches: 256
  checkpoint_dir: tmp/checkpoints/nes_policy

  training_dataset:
    batch_size: &stage3_batch_size 16
    data_folder: annotate/bc_data/level1_grey_168
    num_workers: 8

  validation_datasets:
    - batch_size: *stage3_batch_size
      validation_name: "overall"
      num_workers: 2


wandb:
  enabled: false
  project: "policy_model"
  exp_name: "contra-nes-img-only-168"

dpo:
  beta: 0.05
  lr: 5.0e-6
  weight_decay: 1.0e-4
  batch_size: 2
  accumulate_grad_batches: 64
  max_epochs: 3
  val_fraction: 0.1
  label_smoothing: 0.1
  average_logprob: false
  seed: 42
  limit_train_batches: null
  limit_val_batches: null
  data_folder: annotate/bc_data/level1_img_dpo
  kind_filter: null  # 0=dead only, 1=secondary only, null=all
  min_reward_margin: 50.0
  ref_checkpoint: tmp/checkpoints/nes_policy/10m_better_img/best.ckpt
  checkpoint_dir: tmp/checkpoints/nes_policy_dpo
