# Level 1 e5 128M A/B: same PPO setup as level1_e5_128m, but initialized
# from the actor-only BC NatureCNN checkpoint.

game: Contra-Nes
name: level3_e2_128m_bc
timesteps: 128000000
resume: tmp/ppo/pretrain/level3_bc.zip
seed: 0
device: cuda

num_envs: 16
random_start_frames: 0
warmup_frames: 240
max_episode_steps: 8000
stack: 3

n_steps: 1024
batch_size: 2048
n_epochs: 4
gamma: 0.99
learning_rate: 1.0e-4
clip_range_initial: 0.2
clip_range_final: 0.1
ent_coef_initial: 0.001
ent_coef_final: 0.005


out_dir: tmp/ppo
save_freq: 62500

states:
  - ppo/states/level3_*.state

reward_config: stable
